<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올댓 입시 정보</title>
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f5f6f8;
    --border: #e2e5eb;
    --accent: #2563eb;
    --text: #1a1d27;
    --muted: #6b7280;
    --new: #059669;
    --yellow: #d97706;
    --red: #dc2626;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Malgun Gothic", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
    box-shadow: 0 2px 12px rgba(37,99,235,0.25);
    padding: 10px 18px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    gap: 8px;
  }
  .header-logo {
    display: flex; align-items: center; gap: 10px;
  }
  .header-logo-icon {
    width: 32px; height: 32px; background: rgba(255,255,255,0.15);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .header-logo-text { display: flex; flex-direction: column; line-height: 1.2; }
  .header-logo-text .brand { font-size: .95rem; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .header-logo-text .brand em { color: #93c5fd; font-style: normal; }
  .header-logo-text .sub { font-size: .62rem; color: rgba(255,255,255,.65); letter-spacing: 0.3px; font-weight: 400; }
  #update-time { font-size: 0.65rem; color: rgba(255,255,255,.6); white-space: nowrap; }
  .refresh-btn {
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
    color: rgba(255,255,255,.85); padding: 5px 11px; border-radius: 6px;
    font-size: 0.72rem; cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .refresh-btn:hover { background: rgba(255,255,255,.22); color: #fff; }

  .tabs {
    display: flex; gap: 5px; padding: 10px 16px 0;
    overflow-x: auto; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 49px; z-index: 99;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 6px 12px; border-radius: 20px; font-size: 0.78rem;
    cursor: pointer; transition: all .15s; white-space: nowrap;
    flex-shrink: 0; margin-bottom: 8px;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .tab-btn .cnt { background: rgba(255,255,255,.22); border-radius: 10px; font-size: .66rem; padding: 1px 5px; margin-left: 3px; }
  .tab-btn.bookmark-tab.active { background: var(--yellow); border-color: var(--yellow); color: #000; }
  .tab-btn.search-tab.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }

  /* 검색창 */
  .search-bar {
    padding: 12px 16px;
    background: var(--bg);
    position: sticky; top: 93px; z-index: 98;
    border-bottom: 1px solid var(--border);
  }
  .search-input-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    transition: border-color .15s;
  }
  .search-input-wrap:focus-within { border-color: #7c3aed; }
  .search-input-wrap span { font-size: 1rem; color: var(--muted); }
  .search-input {
    flex: 1; background: none; border: none; outline: none;
    font-size: 0.9rem; color: var(--text); font-family: inherit;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-clear {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; padding: 0 2px;
    display: none;
  }
  .search-clear.visible { display: block; }
  .search-count {
    font-size: 0.75rem; color: var(--muted); padding: 4px 0 0 2px;
  }


  /* 검색 오버레이 */
  .search-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-start;
    padding-top: 60px;
  }
  .search-overlay.open { display: flex; }
  .search-box {
    background: var(--surface); width: 100%; max-width: 860px;
    margin: 0 auto; border-radius: 0 0 12px 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 14px 16px 16px;
  }
  .search-input-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 14px; transition: border-color .15s;
  }
  .search-input-wrap:focus-within { border-color: #7c3aed; }
  .search-input {
    flex: 1; background: none; border: none; outline: none;
    font-size: 0.95rem; color: var(--text); font-family: inherit;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-clear {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; padding: 0 2px;
  }
  .search-results {
    margin-top: 10px; max-height: 60vh; overflow-y: auto;
    border-radius: 8px;
  }
  .search-count { font-size: 0.75rem; color: var(--muted); padding: 6px 2px 4px; }

  /* 뉴스 타입 배지 */
  .badge-type {
    font-size: .62rem; font-weight: 600; padding: 1px 6px;
    border-radius: 10px; white-space: nowrap;
  }
  .badge-type.official { background: #fee2e2; color: #991b1b; font-weight: 700; }
  .badge-type.news { background: #dbeafe; color: #1d4ed8; }
  .badge-type.blog { background: #f0fdf4; color: #15803d; }
  .badge-type.cafe { background: #fef9c3; color: #a16207; }

  main { padding: 0 0 20px; max-width: 860px; margin: 0 auto; }

  /* ── 대시보드 ── */
  .dash-search-wrap {
    padding: 14px 16px 8px;
  }
  .dash-search-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 10px 16px;
    transition: border-color .15s;
  }
  .dash-search-bar:focus-within { border-color: var(--accent); }
  .dash-search-bar input {
    border: none; outline: none; background: none;
    font-size: .92rem; flex: 1; color: var(--text);
    font-family: inherit;
  }
  .dash-search-bar input::placeholder { color: var(--muted); }
  .dash-search-bar .search-icon { font-size: 1rem; color: var(--muted); }
  .dash-summary {
    padding: 0 16px 8px; display: flex; gap: 10px; flex-wrap: wrap;
  }
  .dash-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px; flex: 1; min-width: 100px;
  }
  .dash-stat strong { color: var(--accent); font-size: 1.3rem; font-weight: 800; display: block; line-height: 1.2; }
  .dash-stat span { font-size: .72rem; color: var(--muted); }
  .dashboard {
    padding: 0 16px 16px; display: grid;
    grid-template-columns: 1fr 1fr; gap: 10px;
  }
  @media (min-width: 600px) { .dashboard { grid-template-columns: repeat(3, 1fr); } }
  .dash-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px; cursor: pointer;
    transition: all .15s; overflow: hidden;
  }
  .dash-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(37,99,235,0.1); transform: translateY(-1px); }
  .dash-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
  .dash-card-title { font-size: .85rem; font-weight: 700; color: var(--text); }
  .dash-card-cnt { background: var(--accent); color: #fff; font-size: .65rem; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
  .dash-card-arrow { font-size: .7rem; color: var(--muted); margin-left: auto; padding-left: 6px; }
  .dash-card-items { list-style: none; }
  .dash-card-items li {
    font-size: .73rem; color: var(--muted); padding: 4px 0;
    border-bottom: 1px solid var(--border); line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .dash-card-items li:last-child { border-bottom: none; }
  .dash-card-items li a {
    color: var(--muted); text-decoration: none;
    display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dash-card-items li a:hover { color: var(--accent); text-decoration: underline; }
  .dash-card-bm { background: #fffbeb; border-color: #fde68a; }
  .dash-card-bm .dash-card-cnt { background: var(--yellow); }
  .dash-card-today { background: #f0fdf4; border-color: #bbf7d0; }
  .dash-card-today .dash-card-cnt { background: var(--new); }
  .dash-card-empty { background: var(--surface2); border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; }
  .dash-card-empty span { font-size: .8rem; color: var(--muted); }

  .section { display: none; }
  .section.active { display: block; }

  /* 뉴스 아이템 */
  .news-list { list-style: none; }
  .news-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 7px;
    transition: border-color .15s; position: relative;
  }
  .news-item:hover { border-color: var(--accent); }
  .news-item.bookmarked { border-left: 3px solid var(--yellow); }
  .news-item.deleted { display: none; }
  .news-item.filter-hidden { display: none; }

  .news-title-row { display: flex; align-items: flex-start; gap: 8px; }
  .news-title-row a {
    color: var(--text); text-decoration: none; font-size: 0.88rem;
    font-weight: 500; line-height: 1.5; flex: 1;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .news-title-row a:hover { color: var(--accent); }

  .item-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: 1px; }
  .action-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
    font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--text); }
  .action-btn.active-bookmark { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,.1); }
  .action-btn.active-delete { border-color: var(--red); color: var(--red); }
  .action-btn.active-noise { border-color: #f97316; color: #f97316; background: rgba(249,115,22,.08); }

  .news-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.72rem; color: var(--muted); margin-top: 6px;
  }
  .badge-new {
    background: var(--new); color: #000; font-size: .62rem;
    font-weight: 700; padding: 1px 6px; border-radius: 10px;
  }

  /* 메모 영역 */
  .memo-area { margin-top: 8px; display: none; }
  .memo-area.open { display: block; }
  .memo-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.82rem;
    padding: 7px 10px; resize: none; font-family: inherit; line-height: 1.4;
    outline: none;
  }
  .memo-input:focus { border-color: var(--accent); }
  .memo-display {
    background: rgba(108,142,247,.08); border: 1px solid rgba(108,142,247,.2);
    border-radius: 6px; padding: 6px 10px; font-size: 0.8rem;
    color: #b0b8d0; margin-top: 0; cursor: pointer; line-height: 1.5;
  }
  .memo-display::before { content: "📌 "; }

  .empty { color: var(--muted); font-size: .88rem; padding: 50px 0; text-align: center; }
  .loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: .88rem; }

  /* 삭제된 항목 복원 버튼 */
  .restore-bar {
    font-size: .75rem; color: var(--muted); text-align: center;
    padding: 10px 0; cursor: pointer;
  }
  .restore-bar:hover { color: var(--text); }

  /* 노이즈 탭 */
  .tab-btn.noise-tab.active { background: #f97316; border-color: #f97316; color: #fff; }
  .noise-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .noise-header h3 { font-size: .9rem; font-weight: 600; color: var(--text); }
  .noise-header p { font-size: .75rem; color: var(--muted); margin-top: 2px; }
  .export-btn {
    background: #f97316; border: none; color: #fff;
    padding: 7px 16px; border-radius: 7px; font-size: .8rem;
    cursor: pointer; font-weight: 600; transition: opacity .15s; white-space: nowrap;
  }
  .export-btn:hover { opacity: .85; }
  .noise-item {
    background: var(--surface); border: 1px solid #fed7aa;
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 7px;
  }
  .noise-item-title { font-size: .85rem; color: var(--text); margin-bottom: 5px; line-height: 1.4; }
  .noise-item-meta { font-size: .72rem; color: var(--muted); display: flex; gap: 10px; align-items: center; }
  .noise-pattern-tag {
    background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412;
    font-size: .68rem; padding: 2px 7px; border-radius: 10px;
  }
  .noise-remove-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 3px 10px; border-radius: 5px; font-size: .72rem; cursor: pointer;
    margin-left: auto; transition: all .15s;
  }
  .noise-remove-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <div class="header-logo-icon">🎓</div>
    <div class="header-logo-text">
      <span class="brand"><em>올댓</em> 입시정보</span>
      <span class="sub">대입 · 수능 · 논술 · 입시 뉴스</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="update-time"></span>
    <button class="refresh-btn" onclick="manualRefresh()">↻ 새로고침</button>
  </div>
</header>

<!-- 검색 오버레이 -->
<div class="search-overlay" id="search-overlay" onclick="closeSearchOnBg(event)">
  <div class="search-box">
    <div class="search-input-wrap">
      <span style="font-size:1rem;color:var(--muted)">🔍</span>
      <input class="search-input" id="search-input" type="text" placeholder="키워드 검색 (예: 킬러문항, 논술, 수시 최저…)"
        oninput="onSearchInput(this.value)"
        onkeydown="if(event.key==='Escape')closeSearch()">
      <button class="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-count" id="search-count"></div>
    <div class="search-results" id="search-results">
      <div class="empty" style="padding:20px 0;font-size:.85rem;">키워드를 입력하세요</div>
    </div>
  </div>
</div>

<nav class="tabs" id="tabs"></nav>
<main id="main"><div class="loading">뉴스를 불러오는 중…</div></main>

<script>
// ── localStorage 저장소 ──────────────────────────────────────
const LS = {
  get(key) { try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; } },
  set(key, val) { localStorage.setItem(key, JSON.stringify(val)); },
};
function getBookmarks() { return LS.get('bookmarks') || {}; }
function getDeleted()   { return LS.get('deleted')   || {}; }
function getMemos()     { return LS.get('memos')      || {}; }

// ── 노이즈 관련 ───────────────────────────────────────────────
function getNoise() { return LS.get('noise') || {}; }  // {id: {title, source, patterns}}

const STOPWORDS_NOISE = new Set(["수학","수능","입시","학생","교육","대학","고등","분석","결과","발표","이번","지난","위한","서울","경기","2027","2026","2025"]);

function extractPatterns(item) {
  const patterns = [];
  // 1) 출처명 그대로 패턴화
  if (item.source && item.source.length > 1) {
    patterns.push({ type: 'source', value: item.source });
  }
  // 2) 제목에서 의미 있는 고유 키워드 추출 (2글자 이상, 불용어 제외)
  const words = (item.title || '').match(/[가-힣a-zA-Z0-9]{2,}/g) || [];
  const keywords = words.filter(w => w.length >= 2 && !STOPWORDS_NOISE.has(w)).slice(0, 3);
  keywords.forEach(k => patterns.push({ type: 'keyword', value: k }));
  return patterns;
}

function toggleNoise(id) {
  const noise = getNoise();
  if (noise[id]) {
    delete noise[id];
    LS.set('noise', noise);
    refreshItemState(id);
    if (currentCat === 'noise') renderNoise();
    updateNoiseBadge();
    return;
  }
  const all = window._data?.categories.flatMap(c => c.items.map(i => ({...i, catName:c.name, catEmoji:c.emoji}))) || [];
  const item = all.find(i => i.id === id);
  if (!item) return;
  noise[id] = { title: item.title, source: item.source || '', type: item.type || 'news', patterns: extractPatterns(item) };
  LS.set('noise', noise);
  refreshItemState(id);
  updateNoiseBadge();
  if (currentCat === 'home') renderDashboard();
  // 노이즈 추가 시 자동으로 패턴 파일 다운로드 → 저장소에 커밋하면 영구 적용
  autoExportNoise();
}

function autoExportNoise() {
  const noise = getNoise();
  const sources = [...new Set(Object.values(noise).map(n => n.source).filter(Boolean))];
  const keywords = [...new Set(Object.values(noise).flatMap(n =>
    (n.patterns||[]).filter(p=>p.type==='keyword').map(p=>p.value)
  ))];
  const blob = new Blob([JSON.stringify({sources, title_keywords: keywords}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'noise_patterns.json';
  a.click();
}

function removeNoiseItem(id) {
  const noise = getNoise(); delete noise[id]; LS.set('noise', noise);
  renderNoise(); updateNoiseBadge();
}

function updateNoiseBadge() {
  const btn = document.querySelector('.noise-tab .cnt');
  if (btn) btn.textContent = Object.keys(getNoise()).length;
}

function exportNoisePatterns() {
  const noise = getNoise();
  const sources = [...new Set(Object.values(noise).map(n => n.source).filter(Boolean))];
  const keywords = [...new Set(Object.values(noise).flatMap(n => n.patterns.filter(p => p.type === 'keyword').map(p => p.value)))];
  const output = { sources, title_keywords: keywords, updated_at: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'noise_patterns.json'; a.click();
  alert(`노이즈 패턴 저장 완료!\n출처 ${sources.length}개 · 키워드 ${keywords.length}개\n\nnoise_patterns.json을 math-news-site 폴더에 넣어주세요.`);
}

function renderNoise() {
  const section = document.querySelector('[data-cat="noise"]');
  if (!section) return;
  const noise = getNoise();
  const items = Object.entries(noise);
  if (!items.length) {
    section.innerHTML = '<div class="empty">노이즈로 표시한 기사가 없습니다.<br><small style="color:#9ca3af;font-size:.8rem">기사 오른쪽 🚫 버튼으로 추가하세요.</small></div>';
    return;
  }
  const sources = [...new Set(items.map(([,n]) => n.source).filter(Boolean))];
  const keywords = [...new Set(items.flatMap(([,n]) => n.patterns.filter(p=>p.type==='keyword').map(p=>p.value)))];

  let html = `<div class="noise-header">
    <div>
      <h3>🚫 노이즈 패턴 ${items.length}건</h3>
      <p>출처 ${sources.length}개 · 키워드 ${keywords.length}개가 다음 수집부터 필터됩니다</p>
    </div>
    <button class="export-btn" onclick="exportNoisePatterns()">💾 패턴 저장</button>
  </div><ul class="news-list">`;

  items.forEach(([id, n]) => {
    const tagHtml = n.patterns.map(p =>
      `<span class="noise-pattern-tag">${p.type === 'source' ? '출처: ' : '키워드: '}${p.value}</span>`
    ).join(' ');
    html += `<li class="noise-item">
      <div class="noise-item-title">${n.title}</div>
      <div class="noise-item-meta">
        ${tagHtml}
        <button class="noise-remove-btn" onclick="removeNoiseItem('${id}')">✕ 제거</button>
      </div>
    </li>`;
  });
  html += '</ul>';
  section.innerHTML = html;
}

function toggleBookmark(id) {
  const bm = getBookmarks();
  if (bm[id]) {
    delete bm[id];
    // 저장된 아이템 데이터도 삭제
    const saved = LS.get('bm_items') || {};
    delete saved[id];
    LS.set('bm_items', saved);
  } else {
    bm[id] = true;
    // 아이템 전체 데이터 저장 (JSON에서 만료돼도 북마크탭 유지)
    const all = window._data?.categories.flatMap(c => c.items.map(i => ({...i, catName:c.name, catEmoji:c.emoji}))) || [];
    const item = all.find(i => i.id === id);
    if (item) {
      const saved = LS.get('bm_items') || {};
      saved[id] = item;
      LS.set('bm_items', saved);
    }
  }
  LS.set('bookmarks', bm);
  refreshItemState(id);
  updateBookmarkTab();
}
function deleteItem(id) {
  const del = getDeleted(); del[id] = true; LS.set('deleted', del);
  refreshItemState(id);
  if (currentCat === 'home') renderDashboard();
}
function restoreAll() {
  LS.set('deleted', {}); renderMain(window._data.categories); switchTab(currentCat, document.querySelector('.tab-btn.active'));
}
function saveMemo(id, text) {
  const m = getMemos();
  text.trim() ? (m[id] = text.trim()) : delete m[id];
  LS.set('memos', m);
}

function refreshItemState(id) {
  const els = document.querySelectorAll(`[data-id="${id}"]`);
  if (!els.length) return;
  const bm = getBookmarks(); const del = getDeleted(); const noise = getNoise();
  els.forEach(el => {
    el.classList.toggle('bookmarked', !!bm[id]);
    el.classList.toggle('deleted', !!del[id] || !!noise[id]);
    const bmBtn = el.querySelector('.btn-bm');
    if (bmBtn) bmBtn.classList.toggle('active-bookmark', !!bm[id]);
    const noiseBtn = el.querySelector('.btn-noise');
    if (noiseBtn) noiseBtn.classList.toggle('active-noise', !!noise[id]);
  });
}

// ── 필터 상태 ─────────────────────────────────────────────────
let currentCat = 'all';

function applyFilters() {
  // 블로그 수집 없으므로 별도 필터 불필요
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
}

function getVisibleItems(items) {
  const deleted = getDeleted();
  const noise = getNoise();
  const { sources: noiseSrc, keywords: noiseKws } = getNoisePatterns();
  return items.filter(i => {
    if (i.type === 'blog' || i.type === 'cafearticle') return false;
    if (deleted[i.id] || noise[i.id]) return false;
    if (noiseSrc.has(i.source)) return false;
    if (noiseKws.some(kw => i.title.includes(kw))) return false;
    return true;
  });
}

function renderTabs(categories) {
  const el = document.getElementById('tabs');
  let html = `<button class="tab-btn active" onclick="switchTab('home',this)">🏠 홈</button>`;
  categories.forEach(c => {
    html += `<button class="tab-btn" onclick="switchTab('${c.id}',this)">${c.emoji} ${c.name}</button>`;
  });
  html += `<button class="tab-btn bookmark-tab" onclick="switchTab('bookmarks',this)">★ 북마크</button>`;
  html += `<button class="tab-btn noise-tab" onclick="switchTab('noise',this)">🚫 필터링</button>`;
  el.innerHTML = html;
}

function updateBookmarkTab() {
  const btn = document.querySelector('.bookmark-tab .cnt');
  if (btn) btn.textContent = Object.keys(getBookmarks()).length;
  if (currentCat === 'bookmarks') renderBookmarks();
}

function renderMain(categories) {
  const main = document.getElementById('main');
  const allItems = categories.flatMap(c => c.items.map(i => ({...i, catName: c.name, catEmoji: c.emoji})));
  allItems.sort((a,b) => new Date(b.published) - new Date(a.published));

  let html = `<section class="section active" data-cat="home"></section>`;
  html += `<section class="section" data-cat="all">${renderList(allItems, true)}</section>`;
  categories.forEach(c => {
    const sorted = [...c.items].sort((a,b) => new Date(b.published) - new Date(a.published));
    html += `<section class="section" data-cat="${c.id}">${renderList(sorted, false)}</section>`;
  });
  html += `<section class="section" data-cat="bookmarks"></section>`;
  html += `<section class="section" data-cat="noise"></section>`;
  main.innerHTML = html;
  applyDeletedState();
  renderDashboard();
}

function typeBadge(type) {
  if (type === 'official') return '<span class="badge-type official">🏛 공식</span>';
  if (type === 'news') return '<span class="badge-type news">📰 뉴스</span>';
  if (type === 'blog') return '<span class="badge-type blog">📝 블로그</span>';
  if (type === 'cafearticle') return '<span class="badge-type cafe">💬 카페</span>';
  return '';
}

function gradeBadge(grade) {
  if (grade === '1') return '<span class="badge-grade g1">고1</span>';
  if (grade === '2') return '<span class="badge-grade g2">고2</span>';
  if (grade === '3') return '<span class="badge-grade g3">고3</span>';
  return '';
}

function renderList(items, showCat) {
  if (!items.length) return '<div class="empty">수집된 뉴스가 없습니다.</div>';
  const bm = getBookmarks(); const del = getDeleted(); const memos = getMemos(); const noise = getNoise();
  const { sources: noiseSrc, keywords: noiseKws } = getNoisePatterns();

  // NEW 먼저 → 최신 날짜순 (뉴스/블로그 구분 없이)
  const sorted = [...items].sort((a, b) => {
    if (!!b.is_new !== !!a.is_new) return b.is_new ? 1 : -1;
    return new Date(b.published) - new Date(a.published);
  });

  let html = '<ul class="news-list">';
  sorted.forEach(item => {
    const isDeleted = !!del[item.id];
    const isBookmarked = !!bm[item.id];
    const isNoise = !!noise[item.id];
    // 노이즈 자동 필터: 저장된 출처/키워드 패턴과 일치하면 자동 숨김
    const isAutoNoise = !isNoise && !isBookmarked && (
      (item.source && noiseSrc.has(item.source)) ||
      noiseKws.some(kw => item.title.includes(kw))
    );
    const memo = memos[item.id] || '';
    const grade = item.grade || 'all';
    const type  = item.type  || 'news';
    html += `
    <li class="news-item${isBookmarked?' bookmarked':''}${isDeleted||isNoise||isAutoNoise?' deleted':''}"
        data-id="${item.id}" data-grade="${grade}" data-type="${type}">
      <div class="news-title-row">
        <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
        <div class="item-actions">
          <button class="action-btn btn-bm${isBookmarked?' active-bookmark':''}" onclick="toggleBookmark('${item.id}')" title="북마크">★</button>
          <button class="action-btn" onclick="toggleMemo('${item.id}')" title="메모">✏</button>
          <button class="action-btn btn-noise${isNoise?' active-noise':''}" onclick="toggleNoise('${item.id}')" title="노이즈">🚫</button>
          <button class="action-btn" onclick="deleteItem('${item.id}')" title="숨기기">✕</button>
        </div>
      </div>
      <div class="news-meta">
        ${item.is_new ? '<span class="badge-new">NEW</span>' : ''}
        ${typeBadge(type)}
        ${gradeBadge(grade)}
        ${showCat && item.catName ? `<span>${item.catEmoji} ${item.catName}</span>` : ''}
        ${item.source ? `<span>${item.source}</span>` : ''}
        <span>${formatDate(item.published)}</span>
      </div>
      <div class="memo-area${memo?' open':''}" id="memo-${item.id}">
        ${memo
          ? `<div class="memo-display" onclick="openMemoEdit('${item.id}')">${memo}</div>`
          : `<textarea class="memo-input" rows="2" placeholder="메모를 입력하고 Enter…" onblur="commitMemo('${item.id}',this)" onkeydown="memoKey(event,'${item.id}',this)">${memo}</textarea>`
        }
      </div>
    </li>`;
  });
  html += '</ul>';
  const deletedCount = items.filter(i => !!del[i.id]).length;
  if (deletedCount > 0) {
    html += `<div class="restore-bar" onclick="restoreAll()">숨긴 항목 ${deletedCount}개 · 클릭하여 모두 복원</div>`;
  }
  return html;
}

function renderBookmarks() {
  const section = document.querySelector('[data-cat="bookmarks"]');
  if (!section) return;
  const bm = getBookmarks();
  const savedItems = LS.get('bm_items') || {};

  // 현재 JSON에 있는 아이템 + JSON에서 만료됐지만 저장된 아이템 모두 포함
  const liveAll = window._data
    ? window._data.categories.flatMap(c => c.items.map(i => ({...i, catName:c.name, catEmoji:c.emoji})))
    : [];
  const liveMap = Object.fromEntries(liveAll.map(i => [i.id, i]));

  const bmItems = Object.keys(bm).map(id => liveMap[id] || savedItems[id]).filter(Boolean);
  bmItems.sort((a,b) => new Date(a.published) - new Date(b.published));

  section.innerHTML = bmItems.length
    ? renderList(bmItems, true)
    : '<div class="empty">북마크한 기사가 없습니다.<br><small style="color:#9ca3af;font-size:.8rem">기사 오른쪽 ★ 버튼으로 저장하세요.</small></div>';
}

function applyDeletedState() {
  const del = getDeleted();
  Object.keys(del).forEach(id => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) el.classList.add('deleted');
  });
}

// ── 메모 인터랙션 ─────────────────────────────────────────────
function getMemoAreas(id) {
  // 같은 id가 전체탭+카테고리탭 두 곳에 있을 수 있으므로 querySelectorAll 사용
  return document.querySelectorAll(`.memo-area[id="memo-${id}"]`);
}
function toggleMemo(id) {
  const areas = getMemoAreas(id);
  if (!areas.length) return;
  const isOpen = areas[0].classList.contains('open');
  areas.forEach(area => {
    if (isOpen) {
      area.classList.remove('open');
    } else {
      area.classList.add('open');
      const ta = area.querySelector('textarea');
      if (ta) setTimeout(() => ta.focus(), 50);
    }
  });
}
function memoKey(e, id, ta) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commitMemo(id, ta); }
  if (e.key === 'Escape') { getMemoAreas(id).forEach(a => a.classList.remove('open')); }
}
function commitMemo(id, ta) {
  saveMemo(id, ta.value);
  const text = getMemos()[id] || '';
  getMemoAreas(id).forEach(area => {
    if (text) {
      area.innerHTML = `<div class="memo-display" onclick="openMemoEdit('${id}')">${text}</div>`;
    } else {
      area.classList.remove('open');
      area.innerHTML = `<textarea class="memo-input" rows="2" placeholder="메모를 입력하고 Enter…" onblur="commitMemo('${id}',this)" onkeydown="memoKey(event,'${id}',this)"></textarea>`;
    }
  });
}
function openMemoEdit(id) {
  const text = getMemos()[id] || '';
  getMemoAreas(id).forEach(area => {
    area.innerHTML = `<textarea class="memo-input" rows="2" onblur="commitMemo('${id}',this)" onkeydown="memoKey(event,'${id}',this)">${text}</textarea>`;
    setTimeout(() => area.querySelector('textarea')?.focus(), 30);
  });
}

// ── 탭 전환 ───────────────────────────────────────────────────
// ── 대시보드 ──────────────────────────────────────────────────
function renderDashboard() {
  const section = document.querySelector('[data-cat="home"]');
  if (!section || !window._data) return;
  const cats = window._data.categories;
  const total = cats.reduce((s,c) => s + getVisibleItems(c.items).length, 0);
  const today = new Date().toLocaleDateString('ko-KR', {month:'long', day:'numeric'});
  const d = window._data.updated_at;
  const diff = (Date.now() - new Date(d)) / 1000;
  const ago = diff < 60 ? '방금 전' : diff < 3600 ? `${Math.floor(diff/60)}분 전` : `${Math.floor(diff/3600)}시간 전`;

  let html = `
  <div class="dash-summary">
    <div class="dash-stat" onclick="switchToTab('all')" style="cursor:pointer;transition:all .15s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor=''">
      <strong>${total}</strong><span>총 기사 →</span>
    </div>
    <div class="dash-stat" style="display:flex;align-items:center;gap:8px;padding:8px 14px;">
      <span style="font-size:.9rem;color:var(--muted);">🔍</span>
      <input type="text" placeholder="키워드 검색…"
        style="border:none;outline:none;background:none;font-size:.85rem;flex:1;color:var(--text);font-family:inherit;min-width:0;"
        oninput="onDashSearch(this.value)"
        onkeydown="if(event.key==='Escape'){this.value='';onDashSearch('');}">
    </div>
  </div>
  <div class="dashboard" id="dash-grid">`;

  cats.forEach(c => {
    const visible = getVisibleItems(c.items);
    // pinned 우선 → is_new → 최신순
    const sorted = [...visible].sort((a, b) => {
      if (!!b.pinned !== !!a.pinned) return b.pinned ? 1 : -1;
      if (!!b.is_new !== !!a.is_new) return b.is_new ? 1 : -1;
      return new Date(b.published) - new Date(a.published);
    });
    const recent = sorted.slice(0, 3);
    html += `<div class="dash-card" onclick="switchToTab('${c.id}')">
      <div class="dash-card-top">
        <span class="dash-card-title">${c.emoji} ${c.name}</span>
        <span class="dash-card-cnt">${visible.length}</span>
        <span class="dash-card-arrow">→</span>
      </div>
      <ul class="dash-card-items">
        ${recent.map(i=>`<li><a href="${i.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${i.title}</a></li>`).join('')}
      </ul>
    </div>`;
  });

  html += '</div>';
  section.innerHTML = html;
}

function onDashSearch(q) {
  const kw = q.trim().toLowerCase();
  if (!kw) {
    // 검색어 없으면 검색결과 숨기고 그리드 보이기
    const res = document.getElementById('dash-search-results');
    if (res) res.remove();
    const grid = document.getElementById('dash-grid');
    if (grid) grid.style.display = '';
    return;
  }
  const cats = window._data?.categories || [];
  const allItems = cats.flatMap(c => c.items.map(i => ({...i, catName: c.name, catEmoji: c.emoji})));
  const matched = allItems.filter(i => i.title.toLowerCase().includes(kw)).slice(0, 30);
  const grid = document.getElementById('dash-grid');
  if (grid) grid.style.display = 'none';
  let el = document.getElementById('dash-search-results');
  if (!el) {
    el = document.createElement('div');
    el.id = 'dash-search-results';
    el.style.cssText = 'padding:0 16px 16px;';
    grid?.parentNode.insertBefore(el, grid.nextSibling) || document.querySelector('[data-cat="home"]').appendChild(el);
  }
  if (!matched.length) {
    el.innerHTML = `<p style="text-align:center;color:var(--muted);padding:30px 0;font-size:.85rem;">검색 결과 없음</p>`;
    return;
  }
  el.innerHTML = `<div style="font-size:.75rem;color:var(--muted);margin-bottom:8px;">"${q}" 검색 결과 ${matched.length}건</div>` +
    matched.map(i => `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:6px;">
      <a href="${i.link}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none;font-size:.87rem;font-weight:500;line-height:1.5;display:block;"
         onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text)'">${i.title}</a>
      <div style="font-size:.7rem;color:var(--muted);margin-top:3px;">${i.catEmoji} ${i.catName} · ${i.source||''}</div>
    </div>`).join('');
}

function switchToTab(catId) {
  const btn = [...document.querySelectorAll('.tab-btn')].find(b => b.getAttribute('onclick')?.includes(`'${catId}'`));
  switchTab(catId, btn || null);
}

// ── 노이즈 자동 필터 패턴 ──────────────────────────────────────
function getNoisePatterns() {
  const noise = getNoise();
  const sources = new Set(Object.values(noise).map(n=>n.source).filter(Boolean));
  const keywords = [...new Set(Object.values(noise).flatMap(n=>
    (n.patterns||[]).filter(p=>p.type==='keyword').map(p=>p.value)
  ))];
  return { sources, keywords };
}

// ── 검색 오버레이 ─────────────────────────────────────────────
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input')?.focus(), 100);
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
}
function closeSearchOnBg(e) {
  if (e.target === document.getElementById('search-overlay')) closeSearch();
}
function clearSearch() {
  const input = document.getElementById('search-input');
  if (input) { input.value = ''; input.focus(); }
  document.getElementById('search-count').textContent = '';
  document.getElementById('search-results').innerHTML = '<div class="empty" style="padding:20px 0;font-size:.85rem;">키워드를 입력하세요</div>';
}
function onSearchInput(val) {
  const q = val.trim().toLowerCase();
  const countEl = document.getElementById('search-count');
  const resultsEl = document.getElementById('search-results');
  if (!q) { clearSearch(); return; }
  const all = window._data?.categories.flatMap(c => c.items.map(i => ({...i, catName:c.name, catEmoji:c.emoji}))) || [];
  const results = all.filter(i => i.title.toLowerCase().includes(q) || (i.source||'').toLowerCase().includes(q));
  results.sort((a,b) => new Date(b.published) - new Date(a.published));
  countEl.textContent = results.length ? `검색 결과 ${results.length}건` : '결과 없음';
  resultsEl.innerHTML = results.length
    ? renderList(results, true)
    : '<div class="empty" style="padding:20px 0;">검색 결과가 없습니다.</div>';
}

function switchTab(catId, btn) {
  currentCat = catId;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.dataset.cat === catId));
  if (catId === 'home') renderDashboard();
  if (catId === 'bookmarks') renderBookmarks();
  if (catId === 'noise') renderNoise();
  if (catId !== 'home') applyFilters();
}

// ── 서버 노이즈 패턴 로드 (noise_patterns.json → localStorage 병합) ──
async function loadServerNoisePatterns() {
  try {
    const res = await fetch(`noise_patterns.json?t=${Date.now()}`);
    if (!res.ok) return;
    const data = await res.json();
    const noise = getNoise();
    let added = 0;
    // 서버 출처 → localStorage noise에 등록 (없는 것만)
    for (const src of (data.sources || [])) {
      const key = 'srv_src_' + btoa(encodeURIComponent(src)).slice(0,16);
      if (!noise[key]) {
        noise[key] = { title: src, source: src, type: 'news',
          patterns: [{ type: 'source', value: src }] };
        added++;
      }
    }
    // 서버 키워드 → localStorage noise에 등록
    for (const kw of (data.title_keywords || [])) {
      const key = 'srv_kw_' + btoa(encodeURIComponent(kw)).slice(0,16);
      if (!noise[key]) {
        noise[key] = { title: kw, source: '', type: 'news',
          patterns: [{ type: 'keyword', value: kw }] };
        added++;
      }
    }
    if (added > 0) LS.set('noise', noise);
  } catch { /* noise_patterns.json 없으면 무시 */ }
}

// ── 토스트 메시지 ──────────────────────────────────────────────
function showToast(msg, duration = 2800) {
  let toast = document.getElementById('toast-msg');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast-msg';
    toast.style.cssText = 'position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(30,30,40,.92);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .25s';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._tid);
  toast._tid = setTimeout(() => { toast.style.opacity = '0'; }, duration);
}

// ── 데이터 로드 ───────────────────────────────────────────────
async function loadNews() {
  await loadServerNoisePatterns();
  try {
    const res = await fetch(`news_data.json?t=${Date.now()}`);
    if (!res.ok) throw new Error();
    window._data = await res.json();

    const diff = (Date.now() - new Date(window._data.updated_at)) / 1000;
    const ago = diff < 60 ? '방금 전' : diff < 3600 ? `${Math.floor(diff/60)}분 전` : `${Math.floor(diff/3600)}시간 전`;
    const ut = document.getElementById('update-time'); if(ut) ut.textContent = `업데이트: ${ago}`;

    renderTabs(window._data.categories);
    renderMain(window._data.categories);

    if (currentCat !== 'all') {
      const btn = [...document.querySelectorAll('.tab-btn')].find(b => b.getAttribute('onclick')?.includes(`'${currentCat}'`));
      switchTab(currentCat, btn || null);
    }
  } catch {
    document.getElementById('main').innerHTML = '<div class="empty">뉴스 데이터를 불러올 수 없습니다.<br><small>scraper.py를 먼저 실행해주세요.</small></div>';
    const ut2 = document.getElementById('update-time'); if(ut2) ut2.textContent = '데이터 없음';
  }
}

async function manualRefresh() {
  const prevUpdatedAt = window._data?.updated_at || null;
  await loadNews();
  const newUpdatedAt = window._data?.updated_at || null;
  if (prevUpdatedAt && prevUpdatedAt === newUpdatedAt) {
    showToast('새로운 정보가 없습니다');
  } else if (newUpdatedAt) {
    showToast('업데이트 완료');
  }
}

loadNews();
setInterval(loadNews, 20 * 60 * 1000);
