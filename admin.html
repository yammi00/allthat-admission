<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올댓 입시정보 — 어드민</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Pretendard", sans-serif; background: #f1f5f9; color: #1e293b; font-size: 14px; }

header {
  background: #0f172a; color: #fff; padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 1rem; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 10px; }
.stat { font-size: 0.78rem; color: rgba(255,255,255,.55); }

.toolbar {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 12px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.toolbar input[type=text] {
  flex: 1; min-width: 200px; padding: 7px 12px;
  border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.85rem; font-family: inherit;
  outline: none;
}
.toolbar input[type=text]:focus { border-color: #3b82f6; }
select {
  padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 8px;
  font-size: 0.85rem; font-family: inherit; outline: none; background: #fff; cursor: pointer;
}

.btn { padding: 7px 14px; border-radius: 8px; font-size: 0.82rem; font-family: inherit; cursor: pointer; border: none; font-weight: 600; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-danger  { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-ghost   { background: transparent; color: #64748b; border: 1px solid #cbd5e1; }
.btn-ghost:hover { background: #f8fafc; }
.btn-green   { background: #10b981; color: #fff; }
.btn-green:hover { background: #059669; }

.noise-section {
  background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 24px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.noise-section label { font-size: 0.78rem; color: #64748b; font-weight: 600; white-space: nowrap; }
.noise-section input { width: 200px; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.82rem; font-family: inherit; outline: none; }
.noise-section input:focus { border-color: #f59e0b; }
.chip-list { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: #fef3c7; color: #92400e; border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; font-weight: 600; }
.chip.source { background: #fee2e2; color: #991b1b; }

.table-wrap { padding: 20px 24px; }
.count-bar { font-size: 0.8rem; color: #64748b; margin-bottom: 10px; }

table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
thead { background: #f8fafc; }
th { padding: 10px 12px; text-align: left; font-size: 0.78rem; color: #94a3b8; font-weight: 600; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8fafc; }
tr.deleted td { opacity: 0.35; text-decoration: line-through; }

.title-cell { max-width: 420px; }
.title-link { color: #1e293b; text-decoration: none; font-weight: 500; }
.title-link:hover { color: #3b82f6; text-decoration: underline; }
.source-cell { white-space: nowrap; color: #64748b; font-size: 0.8rem; }
.date-cell { white-space: nowrap; color: #94a3b8; font-size: 0.78rem; }
.cat-badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 600; white-space: nowrap;
  background: #e0f2fe; color: #0369a1;
}
.type-badge {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 0.7rem; font-weight: 700; background: #f1f5f9; color: #64748b;
}
.type-badge.official { background: #fce7f3; color: #9d174d; }

.actions { display: flex; gap: 5px; white-space: nowrap; }
.del-btn { background: none; border: none; cursor: pointer; color: #ef4444; font-size: 1rem; padding: 3px 6px; border-radius: 4px; }
.del-btn:hover { background: #fee2e2; }
.block-src-btn { background: none; border: none; cursor: pointer; color: #f59e0b; font-size: 0.75rem; padding: 3px 6px; border-radius: 4px; border: 1px solid #fcd34d; }
.block-src-btn:hover { background: #fef3c7; }

.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 8px;
  font-size: 0.85rem; font-weight: 600; opacity: 0; transition: opacity .2s;
  pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; }

.push-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #0f172a; color: #fff; padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; z-index: 200; transform: translateY(100%); transition: transform .3s;
}
.push-bar.visible { transform: translateY(0); }
.push-bar .info { font-size: 0.85rem; color: rgba(255,255,255,.7); }
.push-bar .info strong { color: #fff; }

.empty { text-align: center; padding: 60px 0; color: #94a3b8; font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <h1>🔧 올댓 입시정보 — 어드민</h1>
  <div class="header-right">
    <span class="stat" id="total-stat">로딩 중...</span>
    <button class="btn" id="scrape-btn" onclick="runScraper()" style="background:#7c3aed;color:#fff;">▶ 수집 실행</button>
    <button class="btn btn-green" onclick="pushToGithub()">↑ GitHub Push</button>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="제목 / 출처 검색..." oninput="renderTable()">
  <select id="cat-filter" onchange="renderTable()">
    <option value="">전체 카테고리</option>
  </select>
  <select id="type-filter" onchange="renderTable()">
    <option value="">전체 타입</option>
    <option value="official">공식</option>
    <option value="news">뉴스</option>
  </select>
  <button class="btn btn-ghost" onclick="clearFilters()">초기화</button>
</div>

<div class="noise-section">
  <label>출처 차단</label>
  <input type="text" id="src-input" placeholder="예: www.sedaily.com" onkeydown="if(e.key==='Enter')addNoise('source')">
  <button class="btn btn-ghost" onclick="addNoise('source')" style="padding:6px 12px;">추가</button>
  <label style="margin-left:8px;">키워드 차단</label>
  <input type="text" id="kw-input" placeholder="예: 학원 설명회" onkeydown="if(event.key==='Enter')addNoise('keyword')">
  <button class="btn btn-ghost" onclick="addNoise('keyword')" style="padding:6px 12px;">추가</button>
</div>

<div class="noise-section" id="noise-chips" style="gap:8px; padding-top:8px; padding-bottom:8px; min-height:36px;">
  <span style="font-size:0.75rem;color:#94a3b8;">로딩 중...</span>
</div>

<div class="table-wrap">
  <div class="count-bar" id="count-bar"></div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>제목</th>
        <th>출처</th>
        <th>카테고리</th>
        <th>타입</th>
        <th>날짜</th>
        <th>액션</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">기사가 없습니다.</div>
</div>

<div class="push-bar" id="push-bar">
  <div class="info">변경사항 <strong id="change-count">0</strong>건이 대기 중입니다.</div>
  <button class="btn btn-green" onclick="pushToGithub()">↑ GitHub Push</button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3457';
let allArticles = [];
let deletedIds = new Set();
let changeCount = 0;

async function load() {
  try {
    const [aRes, nRes] = await Promise.all([
      fetch(`${API}/api/articles`),
      fetch(`${API}/api/noise`)
    ]);
    const aData = await aRes.json();
    const nData = await nRes.json();

    allArticles = aData.articles;
    document.getElementById('total-stat').textContent = `총 ${aData.total}건`;

    // 카테고리 목록 저장 (이동용)
    window.allCats = [...new Map(allArticles.map(a => [a.cat_id, a.cat_name])).entries()];

    // 카테고리 필터 옵션
    const sel = document.getElementById('cat-filter');
    window.allCats.forEach(([id, name]) => {
      sel.innerHTML += `<option value="${id}">${name}</option>`;
    });

    renderNoiseChips(nData);
    renderTable();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="7" style="text-align:center;padding:40px;color:#ef4444;">
        ⚠️ 서버 연결 실패. <code>python3 admin_server.py</code> 를 실행해주세요.
      </td></tr>`;
  }
}

function renderNoiseChips(nData) {
  const el = document.getElementById('noise-chips');
  let html = '';
  (nData.sources || []).forEach(s => {
    html += `<span class="chip source">🚫 ${s}
      <button onclick="removeNoise('source','${s.replace(/'/g,"\\'")}')" title="차단 해제"
        style="background:none;border:none;cursor:pointer;color:#991b1b;font-size:.85rem;margin-left:2px;padding:0 2px;line-height:1;">✕</button>
    </span>`;
  });
  (nData.title_keywords || []).forEach(k => {
    html += `<span class="chip">🔑 ${k}
      <button onclick="removeNoise('keyword','${k.replace(/'/g,"\\'")}')" title="차단 해제"
        style="background:none;border:none;cursor:pointer;color:#92400e;font-size:.85rem;margin-left:2px;padding:0 2px;line-height:1;">✕</button>
    </span>`;
  });
  el.innerHTML = html || '<span style="font-size:0.75rem;color:#94a3b8;">차단 목록 없음</span>';
}

async function removeNoise(type, val) {
  if (!confirm(`"${val}" 차단을 해제하시겠습니까?`)) return;
  const res = await fetch(`${API}/api/noise/${type}/delete`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({value: val})
  });
  if (res.ok) {
    changeCount++;
    updatePushBar();
    const nRes = await fetch(`${API}/api/noise`);
    renderNoiseChips(await nRes.json());
    toast(`"${val}" 차단 해제`);
  }
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const catF = document.getElementById('cat-filter').value;
  const typeF = document.getElementById('type-filter').value;

  let filtered = allArticles.filter(a => {
    if (catF && a.cat_id !== catF) return false;
    if (typeF && a.type !== typeF) return false;
    if (q && !a.title.toLowerCase().includes(q) && !a.source.toLowerCase().includes(q)) return false;
    return true;
  });

  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '';
    document.getElementById('empty').style.display = '';
    document.getElementById('count-bar').textContent = '';
    return;
  }
  document.getElementById('empty').style.display = 'none';
  document.getElementById('count-bar').textContent = `${filtered.length}건 표시`;

  tbody.innerHTML = filtered.map((a, i) => {
    const del = deletedIds.has(a.id);
    const date = a.published ? a.published.slice(0,10) : '';
    return `<tr class="${del ? 'deleted' : ''}" id="row-${a.id}">
      <td style="color:#94a3b8;font-size:0.75rem">${i+1}</td>
      <td class="title-cell">
        <a class="title-link" href="${a.link}" target="_blank">${a.title}</a>
      </td>
      <td class="source-cell">${a.source}</td>
      <td><span class="cat-badge">${a.cat_name}</span></td>
      <td><span class="type-badge ${a.type}">${a.type === 'official' ? '공식' : '뉴스'}</span></td>
      <td class="date-cell">${date}</td>
      <td class="actions">
        ${del
          ? `<span style="font-size:0.75rem;color:#94a3b8">삭제됨</span>`
          : `<button class="del-btn" onclick="deleteArticle('${a.id}')" title="기사 삭제">✕</button>
             <button class="block-src-btn" onclick="blockSource('${a.source}')" title="출처 전체 차단">차단</button>
             <select onchange="moveArticle('${a.id}', this)" style="font-size:0.75rem;padding:3px 6px;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;max-width:90px;">
               <option value="">이동▾</option>
               ${(window.allCats||[]).filter(([id])=>id!==a.cat_id).map(([id,name])=>`<option value="${id}">${name}</option>`).join('')}
             </select>`
        }
      </td>
    </tr>`;
  }).join('');
}

async function moveArticle(id, sel) {
  const catId = sel.value;
  if (!catId) return;
  const catName = sel.options[sel.selectedIndex].text;
  const res = await fetch(`${API}/api/articles/${id}/move`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({cat_id: catId})
  });
  if (res.ok) {
    // 로컬 데이터 업데이트
    const art = allArticles.find(a => a.id === id);
    if (art) { art.cat_id = catId; art.cat_name = catName; }
    changeCount++;
    updatePushBar();
    renderTable();
    toast(`카테고리 이동 → ${catName}`);
  }
}

async function runScraper() {
  const btn = document.getElementById('scrape-btn');
  btn.disabled = true; btn.textContent = '⏳ 수집 중...';
  try {
    const res = await fetch(`${API}/api/scrape`, { method: 'POST' });
    const data = await res.json();
    if (data.status === 'started') {
      toast('✅ 스크래퍼 시작! 완료 후 새로고침하세요.');
      setTimeout(() => { btn.disabled = false; btn.textContent = '▶ 수집 실행'; }, 5000);
    }
  } catch(e) {
    toast('❌ 실행 실패');
    btn.disabled = false; btn.textContent = '▶ 수집 실행';
  }
}

async function deleteArticle(id) {
  if (!confirm('이 기사를 삭제하시겠습니까?')) return;
  const res = await fetch(`${API}/api/articles/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.deleted > 0) {
    deletedIds.add(id);
    changeCount++;
    updatePushBar();
    renderTable();
    toast('기사 삭제 완료');
  }
}

async function blockSource(source) {
  if (!confirm(`"${source}" 출처를 영구 차단하시겠습니까?\n해당 출처의 모든 기사가 삭제됩니다.`)) return;

  // 해당 출처 기사 모두 삭제
  const toDelete = allArticles.filter(a => a.source === source && !deletedIds.has(a.id));
  for (const a of toDelete) {
    await fetch(`${API}/api/articles/${a.id}`, { method: 'DELETE' });
    deletedIds.add(a.id);
  }

  // noise_patterns에 추가
  await fetch(`${API}/api/noise/source`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({value: source})
  });

  changeCount += toDelete.length;
  updatePushBar();
  renderTable();

  // 노이즈 칩 갱신
  const nRes = await fetch(`${API}/api/noise`);
  renderNoiseChips(await nRes.json());
  toast(`"${source}" 차단 + ${toDelete.length}건 삭제`);
}

async function addNoise(type) {
  const inputId = type === 'source' ? 'src-input' : 'kw-input';
  const val = document.getElementById(inputId).value.trim();
  if (!val) return;

  const res = await fetch(`${API}/api/noise/${type}`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({value: val})
  });
  if (res.ok) {
    document.getElementById(inputId).value = '';
    changeCount++;
    updatePushBar();
    const nRes = await fetch(`${API}/api/noise`);
    renderNoiseChips(await nRes.json());
    toast(`${type === 'source' ? '출처' : '키워드'} 차단 추가: ${val}`);
  }
}

async function pushToGithub() {
  const btn = event.target;
  btn.disabled = true; btn.textContent = '푸시 중...';
  try {
    const res = await fetch(`${API}/api/push`, { method: 'POST' });
    const data = await res.json();
    if (data.status === 'pushed') toast('✅ GitHub Push 완료!');
    else toast('변경사항 없음');
    changeCount = 0;
    updatePushBar();
  } catch(e) {
    toast('❌ Push 실패');
  } finally {
    btn.disabled = false; btn.textContent = '↑ GitHub Push';
  }
}

function updatePushBar() {
  const bar = document.getElementById('push-bar');
  document.getElementById('change-count').textContent = changeCount;
  bar.classList.toggle('visible', changeCount > 0);
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('cat-filter').value = '';
  document.getElementById('type-filter').value = '';
  renderTable();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

load();
</script>
</body>
</html>
